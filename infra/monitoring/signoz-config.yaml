# SigNoz Configuration for VICT Compliance Monitoring

version: '3.8'

services:
  # SigNoz Query Service
  signoz-query-service:
    image: signoz/query-service:latest
    container_name: vict-signoz-query
    environment:
      - STORAGE=clickhouse
      - CLICKHOUSE_HOST=signoz-clickhouse
      - DEPLOYMENT_TYPE=docker
    ports:
      - "8080:8080"
    volumes:
      - ./dashboards:/var/lib/signoz/dashboards
    networks:
      - vict-monitor

  # SigNoz Collector (receives traces/metrics)
  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: vict-signoz-collector
    environment:
      - CLICKHOUSE_HOST=signoz-clickhouse
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - vict-monitor

  # ClickHouse (time-series database)
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: vict-clickhouse
    environment:
      - CLICKHOUSE_DB=signoz
      - CLICKHOUSE_USER=signoz
      - CLICKHOUSE_PASSWORD=signoz_password
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - vict-monitor

  # Prometheus (metrics collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: vict-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vict-monitor

networks:
  vict-monitor:
    driver: bridge

volumes:
  clickhouse-data:
  prometheus-data:
